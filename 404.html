<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="assets/images/favicon.jfif">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost at Sea | Scuba Dive Center</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        body {
            background: var(--dark);
            height: 100vh;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: rise 10s infinite ease-in;
            bottom: -50px;
        }

        @keyframes rise {
            0% {
                transform: translateY(0);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Bubbles Animation -->
    <div class="bubble" style="width: 40px; height: 40px; left: 10%; animation-duration: 8s;"></div>
    <div class="bubble" style="width: 20px; height: 20px; left: 20%; animation-duration: 5s;"></div>
    <div class="bubble" style="width: 60px; height: 60px; left: 35%; animation-duration: 12s;"></div>
    <div class="bubble" style="width: 30px; height: 30px; left: 60%; animation-duration: 6s;"></div>
    <div class="bubble" style="width: 50px; height: 50px; left: 80%; animation-duration: 9s;"></div>

    <div class="container" style="position: relative; z-index: 1;">
        <h1 style="font-size: 8rem; color: var(--secondary); margin-bottom: 0;">404</h1>
        <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">Lost at Sea?</h2>
        <p style="font-size: 1.25rem; opacity: 0.8; max-width: 500px; margin: 0 auto 2rem;">It looks like you've drifted
            too far from the reef. Let's get you back to safety.</p>
        <a href="index.html" class="btn btn-primary">Return to Surface</a>
    </div>

</body>

</html>
