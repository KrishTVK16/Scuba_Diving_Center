<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Scuba Dive Center</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        body {
            background: var(--gradient-ocean);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: white;
            padding: 3rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-center">
        <div class="auth-card">
            <a href="index.html" class="nav-logo justify-center" style="margin-bottom: 2rem;">
                <img src="assets/images/logo3.png" alt="DiveCenter Logo" style="height: 60px;">
            </a>

            <h2 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Create Account</h2>
            <p style="margin-bottom: 2rem;">Join the club and start your underwater journey</p>

            <form action="dashboard.html">
                <div class="grid grid-2" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group text-left" style="text-align: left;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">First Name</label>
                        <input type="text" class="form-control" placeholder="John">
                    </div>
                    <div class="form-group text-left" style="text-align: left;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Last Name</label>
                        <input type="text" class="form-control" placeholder="Doe">
                    </div>
                </div>

                <div class="form-group text-left" style="text-align: left;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email Address</label>
                    <input type="email" class="form-control" placeholder="john@example.com">
                </div>

                <div class="form-group text-left" style="text-align: left;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>

                <div class="form-group text-left" style="text-align: left; font-size: 0.9rem;">
                    <label class="d-flex align-center gap-1" style="align-items: flex-start;">
                        <input type="checkbox" style="margin-top: 4px;">
                        <span>I accept the <a href="#" class="text-primary">Terms of Service</a> & <a href="#"
                                class="text-primary">Privacy Policy</a></span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem;">Create
                    Account</button>
            </form>

            <p style="font-size: 0.9rem; margin-bottom: 0;">Already have an account? <a href="login.html"
                    class="text-primary font-weight-bold">Log In</a></p>
            <div style="margin-top: 2rem;">
                <a href="index.html" class="text-dark" style="font-size: 0.9rem; opacity: 0.7;"><i
                        class="fa-solid fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

</body>

</html>
