<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="assets/images/scubadive_favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Scuba Dive Center</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <script>
        // Immediate Theme Apply to prevent flash
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>

<body>
    <div style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
        <button class="theme-toggle" id="themeToggle" title="Toggle Theme" style="border-color: var(--gray-200);">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>

    <div class="auth-body">
        <div class="auth-card">
            <a href="index.html" class="nav-logo" style="justify-content: center; margin-bottom: 2rem;">
                <div class="logo-icon">
                    <img src="assets/images/scubadive_favicon.png" alt="ScubaDive Logo" class="logo-img" style="height: 100%; width: 100%; object-fit: contain;">
                </div>
                <div class="logo-text">
                    <span class="brand-name">Scuba<span>Dive</span></span>
                </div>
            </a>

            <h2>Create Account</h2>

            <form action="dashboard.html">
                <div class="grid grid-2">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" class="form-control" placeholder="John">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" class="form-control" placeholder="Doe">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>

                <div class="form-group text-left" style="text-align: left; font-size: 0.9rem;">
                    <label class="d-flex align-center gap-1" style="align-items: flex-start;">
                        <input type="checkbox" style="margin-top: 4px;">
                        <span>I accept the <a href="#" class="text-primary">Terms of Service</a> & <a href="#"
                                class="text-primary">Privacy Policy</a></span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem;">Create
                    Account</button>
            </form>

            <div class="social-login">
                <span>OR REGISTER WITH</span>
                <div class="social-btns">
                    <button class="btn-social">
                        <i class="fa-brands fa-google"></i> Google
                    </button>
                    <button class="btn-social">
                        <i class="fa-brands fa-facebook"></i> Facebook
                    </button>
                </div>
            </div>


            <p style="font-size: 0.9rem; margin-bottom: 0;">Already have an account? <a href="login.html"
                    class="text-primary font-weight-bold">Log In</a></p>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>

</html>
