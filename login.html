<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Scuba Dive Center</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        body {
            background: var(--gradient-ocean);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: white;
            padding: 3rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-center">
        <div class="auth-card">
            <a href="index.html" class="nav-logo justify-center" style="margin-bottom: 2rem;">
                <img src="assets/images/logo3.png" alt="DiveCenter Logo" style="height: 60px;">
            </a>

            <h2 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Welcome Back</h2>
            <p style="margin-bottom: 2rem;">Log in to access your dashboard</p>

            <form action="dashboard.html"> <!-- Simulating login -->
                <div class="form-group text-left" style="text-align: left;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email Address</label>
                    <input type="email" class="form-control" placeholder="teacher@divecenter.com">
                </div>

                <div class="form-group text-left" style="text-align: left;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>

                <div class="d-flex justify-between align-center" style="margin-bottom: 1.5rem; font-size: 0.9rem;">
                    <label class="d-flex align-center gap-1">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="text-primary">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem;">Log
                    In</button>
            </form>

            <p style="font-size: 0.9rem; margin-bottom: 0;">Don't have an account? <a href="register.html"
                    class="text-primary font-weight-bold">Sign Up</a></p>
            <div style="margin-top: 2rem;">
                <a href="index.html" class="text-dark" style="font-size: 0.9rem; opacity: 0.7;"><i
                        class="fa-solid fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

</body>

</html>
