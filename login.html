<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="assets/images/favicon.jfif">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Scuba Dive Center</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

<body>

    <div class="auth-body">
        <div class="auth-card">
            <a href="index.html" class="auth-logo">
                <img src="assets/images/logo3.png" alt="DiveCenter Logo">
            </a>

            <h2>Welcome Back</h2>

            <form action="dashboard.html"> <!-- Simulating login -->
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="teacher@divecenter.com">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>

                <div class="d-flex justify-between align-center" style="margin-bottom: 1.5rem; font-size: 0.9rem;">
                    <label class="d-flex align-center gap-1">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="text-primary">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem;">Log
                    In</button>
            </form>

            <div class="social-login">
                <span>OR CONTINUE WITH</span>
                <div class="social-btns">
                    <button class="btn-social">
                        <i class="fa-brands fa-google"></i> Google
                    </button>
                    <button class="btn-social">
                        <i class="fa-brands fa-facebook"></i> Facebook
                    </button>
                </div>
            </div>


            <p style="font-size: 0.9rem; margin-bottom: 0;">Don't have an account? <a href="register.html"
                    class="text-primary font-weight-bold">Sign Up</a></p>

        </div>
    </div>

</body>

</html>
