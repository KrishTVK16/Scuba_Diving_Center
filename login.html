<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="assets/images/favicon.jfif">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Scuba Dive Center</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <script>
        // Immediate Theme Apply to prevent flash
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>

<body>
    <div style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
        <button class="theme-toggle" id="themeToggle" title="Toggle Theme" style="border-color: var(--gray-200);">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>

    <div class="auth-body">
        <div class="auth-card">
            <a href="index.html" class="nav-logo" style="justify-content: center; margin-bottom: 2rem;">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"
                            fill="var(--primary)" fill-opacity="0.1" />
                        <path
                            d="M7 11C7 9.89543 7.89543 9 9 9H15C16.1046 9 17 9.89543 17 11V13C17 14.1046 16.1046 15 15 15H9C7.89543 15 7 14.1046 7 13V11Z"
                            stroke="var(--primary)" stroke-width="2" />
                        <path d="M9 11H15V13H9V11Z" fill="var(--secondary)" fill-opacity="0.4" />
                        <path d="M12 15V18M10 18H14" stroke="var(--primary)" stroke-width="1.5"
                            stroke-linecap="round" />
                        <circle cx="18" cy="8" r="1.5" fill="var(--secondary)" />
                        <circle cx="19.5" cy="5.5" r="1" fill="var(--secondary)" opacity="0.6" />
                    </svg>
                </div>
                <div class="logo-text">
                    <span class="brand-name">Scuba<span>Dive</span></span>
                </div>
            </a>

            <h2>Welcome Back</h2>

            <form action="dashboard.html"> <!-- Simulating login -->
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="teacher@divecenter.com">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>

                <div class="d-flex justify-between align-center" style="margin-bottom: 1.5rem; font-size: 0.9rem;">
                    <label class="d-flex align-center gap-1">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="text-primary">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem;">Log
                    In</button>
            </form>

            <div class="social-login">
                <span>OR CONTINUE WITH</span>
                <div class="social-btns">
                    <button class="btn-social">
                        <i class="fa-brands fa-google"></i> Google
                    </button>
                    <button class="btn-social">
                        <i class="fa-brands fa-facebook"></i> Facebook
                    </button>
                </div>
            </div>


            <p style="font-size: 0.9rem; margin-bottom: 0;">Don't have an account? <a href="register.html"
                    class="text-primary font-weight-bold">Sign Up</a></p>

        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>

</html>
